<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MCQ Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #555; 
        }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed;
            transform: none;
        }
        .hidden { display: none; }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }
        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
            font-size: 0.9rem;
        }
        .password-requirements {
            background: #fff3cd;
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .token-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2em;
            color: #dc3545;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 style="text-align: center; margin-bottom: 10px;">🔄 Reset Password</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Enter your reset token and new password</p>
        
        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>
        
        <div class="info-box" id="autoFillInfo" style="display: none;">
            ✅ <strong>Auto-filled from previous page</strong><br>
            Token: <span class="token-display" id="displayToken"></span>
        </div>
        
        <form onsubmit="resetPassword(event)">
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="text" id="user_id" placeholder="Enter your User ID" required readonly style="background: #f8f9fa;">
                <p style="font-size: 0.85rem; color: #999; margin-top: 5px;">This was provided with your reset token</p>
            </div>
            
            <div class="form-group">
                <label for="reset_token">Reset Token (6 characters)</label>
                <input type="text" id="reset_token" placeholder="Enter the 6-character token" required maxlength="6" style="font-family: monospace; font-size: 1.2em; letter-spacing: 2px;">
                <p style="font-size: 0.85rem; color: #999; margin-top: 5px;">Check your forgot password page for this token</p>
            </div>
            
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" placeholder="Enter new password" required minlength="6">
                <div class="password-requirements">
                    ✓ Minimum 6 characters<br>
                    ✓ Use a strong, unique password
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="Confirm new password" required>
            </div>
            
            <button type="submit" id="resetBtn">Reset Password</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <a href="forgot-password.html" style="color: #667eea; text-decoration: none;">Need a reset token?</a> | 
            <a href="index.html" style="color: #667eea; text-decoration: none;">Back to Login</a>
        </p>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        // Auto-fill from localStorage or URL parameters
        window.onload = function() {
            // Check localStorage first (from forgot-password page)
            const storedToken = localStorage.getItem('reset_token');
            const storedUserId = localStorage.getItem('reset_user_id');
            
            // Check URL parameters as fallback
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const urlUserId = urlParams.get('user_id');
            
            const token = storedToken || urlToken;
            const userId = storedUserId || urlUserId;
            
            if (token) {
                document.getElementById('reset_token').value = token;
                document.getElementById('displayToken').textContent = token;
                document.getElementById('autoFillInfo').style.display = 'block';
            }
            
            if (userId) {
                document.getElementById('user_id').value = userId;
            }
        };

        async function resetPassword(e) {
            e.preventDefault();
            
            const user_id = document.getElementById('user_id').value.trim();
            const reset_token = document.getElementById('reset_token').value.trim();
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.getElementById('resetBtn');

            if (!user_id || !reset_token || !new_password || !confirm_password) {
                showError('Please fill in all fields');
                return;
            }

            if (reset_token.length !== 6) {
                showError('Reset token must be exactly 6 characters');
                return;
            }

            if (new_password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (new_password !== confirm_password) {
                showError('Passwords do not match');
                return;
            }

            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Resetting...';

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id, 
                        reset_token, 
                        new_password 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('✅ Password reset successfully! Redirecting to login...');
                    
                    // Clear localStorage
                    localStorage.removeItem('reset_token');
                    localStorage.removeItem('reset_user_id');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Failed to reset password');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showError('Network error. Please check if the server is running.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            
            // Scroll to top to show error
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            // Scroll to top to show success
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
